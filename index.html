<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>카드 매칭 게임</title>
    <!-- Arcade Game Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Jua&family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=20260715-1">
</head>
<body>

    <div id="home-btn" title="메인 화면으로">🏠 처음으로</div>
    <div id="fullscreen-btn" title="전체화면 전환">📺 전체화면</div>
    <div id="app-container">
        
        <!-- Main Menu (Merged Setup) -->
        <div id="menu-screen" class="screen">
            <div class="menu-header">
                <h1>⚡ 카드 매칭 게임</h1>
            </div>

            <div class="form-container">
                <div class="form-group">
                    <label>🎨 테마 선택</label>
                    <div id="theme-selection" class="selection-grid">
                        <!-- Theme buttons generated here -->
                    </div>
                </div>

                <div class="form-group">
                    <label>👥 인원</label>
                    <div class="count-btns">
                        <button class="count-btn" data-count="1">1인 플레이</button>
                        <button class="count-btn selected" data-count="2">2인 플레이</button>
                        <button class="count-btn" data-count="3">3인 플레이</button>
                        <button class="count-btn" data-count="4">4인 플레이</button>
                    </div>
                </div>
                <button id="start-btn" class="big-orange-btn">게임 시작하기</button>
            </div>
        </div>

        <!-- Gameplay Screen -->
        <div id="game-screen" class="screen hidden" data-players="2">
            <!-- Dynamically populated player areas -->
        </div>

        <!-- Game Over Screen -->
        <div id="gameover-screen" class="screen hidden">
            <h1 id="gameover-title">게임 종료!</h1>
            
            <div class="gameover-stats" id="gameover-stats-container">
                <!-- Dynamically populated gameover stats per player -->
            </div>
            
            <button id="restart-btn" class="big-orange-btn mt-4" style="margin-top: 40px; z-index: 100;">다른 게임 고르기</button>
        </div>
    </div>
    
    <script src="script.js?v=20260714-3"></script>
</body>
</html>
