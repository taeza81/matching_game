<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>짝 맞추기 대결 게임</title>
    <!-- Arcade Game Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Bangers&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=20260708-27">
</head>
<body>



    <div id="app-container">
        <!-- Main Menu -->
        <div id="menu-screen" class="screen">
            <h1>짝 맞추기 대결 게임</h1>
            <button id="start-btn" class="glass-btn primary">게임 시작</button>
        </div>
        <!-- Character & Theme Selection -->
        <div id="setup-screen" class="screen hidden">
            <h2>테마 선택</h2>
            <div id="theme-selection" class="selection-grid">
                <!-- Theme buttons will be generated here -->
            </div>
            
            <div class="player-setup-container">
                <div class="player-setup">
                    <h3>플레이어 1 캐릭터 선택</h3>
                    <div id="p1-char-grid" class="char-grid"></div>
                </div>
                <div class="player-setup">
                    <h3>플레이어 2 캐릭터 선택</h3>
                    <div id="p2-char-grid" class="char-grid"></div>
                </div>
            </div>
            
            <button id="play-btn" class="glass-btn secondary" disabled>준비 완료!</button>
        </div>
        <!-- Gameplay Screen -->
        <div id="game-screen" class="screen hidden split-layout">
            <div id="player1-area" class="player-area left-player">
                <div class="top-section">
                    <div class="hud">
                        <div class="avatar-box" id="p1-avatar"></div>
                        <div class="stats">
                            <div class="score">점수: <span id="p1-score">0</span></div>
                            <div class="hp-bar-container">
                                <div class="hp-bar" id="p1-hp"></div>
                            </div>
                            <div class="hp-text">에너지: <span id="p1-hp-text">100</span> / 100</div>
                        </div>
                    </div>
                    <div class="collection-zone" id="p1-collection">
                        <!-- Matched pairs go here -->
                    </div>
                    <button class="attack-btn hidden" id="p1-attack-btn">공격하기! 🚀</button>
                </div>
                <div class="bottom-section interactive-zone" id="p1-interactive">
                    <!-- Cards will be generated here -->
                </div>
            </div>
            
            <div class="divider"></div>
            <div id="player2-area" class="player-area right-player">
                <div class="top-section">
                    <div class="hud">
                        <div class="avatar-box" id="p2-avatar"></div>
                        <div class="stats">
                            <div class="score">점수: <span id="p2-score">0</span></div>
                            <div class="hp-bar-container">
                                <div class="hp-bar" id="p2-hp"></div>
                            </div>
                            <div class="hp-text">에너지: <span id="p2-hp-text">100</span> / 100</div>
                        </div>
                    </div>
                    <div class="collection-zone" id="p2-collection">
                        <!-- Matched pairs go here -->
                    </div>
                    <button class="attack-btn hidden" id="p2-attack-btn">공격하기! 🚀</button>
                </div>
                <div class="bottom-section interactive-zone" id="p2-interactive">
                    <!-- Cards will be generated here -->
                </div>
            </div>
        </div>
        <!-- Game Over Screen -->
        <div id="gameover-screen" class="screen hidden">
            <div class="victory-container">
                <div class="winner-side">
                    <div class="win-title">🏆 WINNER 🏆</div>
                    <div id="winner-avatar" class="avatar-box large-avatar bounce-anim"></div>
                    <div id="winner-name" class="player-name winner-color">플레이어 1</div>
                </div>
                
                <div class="vs-divider">VS</div>
                
                <div class="loser-side">
                    <div class="loss-title">DEFEATED 😭</div>
                    <div id="loser-avatar" class="avatar-box large-avatar grayscale-anim"></div>
                    <div id="loser-name" class="player-name loser-color">플레이어 2</div>
                </div>
            </div>
            <button id="restart-btn" class="glass-btn primary mt-4" style="font-family: 'Black Han Sans', sans-serif; font-size: 2rem; padding: 15px 40px; margin-top: 40px; z-index: 100;">다시 하기</button>
        </div>
    </div>
    <script src="script.js?v=20260708-27"></script>
</body>
</html>
