<!DOCTYPE html>
<html>
<body>
<img id="img" src="images/characters.jpg" style="display:none;">
<canvas id="canvas"></canvas>
<script>
window.onload = () => {
    const img = document.getElementById("img");
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    canvas.width = img.width;
    canvas.height = img.height;
    ctx.drawImage(img, 0, 0);
    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const data = imageData.data;
    
    // Find non-white pixels
    const isBg = (r,g,b) => r > 240 && g > 240 && b > 240;
    
    // Divide into 4x3 grid and find bounding box for each cell
    const cellW = canvas.width / 4;
    const cellH = canvas.height / 3;
    const boxes = [];
    
    for(let r=0; r<3; r++) {
        for(let c=0; c<4; c++) {
            let minX = canvas.width, minY = canvas.height, maxX = 0, maxY = 0;
            const startX = c * cellW;
            const startY = r * cellH;
            const endX = startX + cellW;
            const endY = startY + cellH;
            
            for(let y = Math.floor(startY); y < endY; y++) {
                for(let x = Math.floor(startX); x < endX; x++) {
                    const i = (y * canvas.width + x) * 4;
                    if(!isBg(data[i], data[i+1], data[i+2])) {
                        if(x < minX) minX = x;
                        if(x > maxX) maxX = x;
                        if(y < minY) minY = y;
                        if(y > maxY) maxY = y;
                    }
                }
            }
            boxes.push({
                c, r,
                x: minX, y: minY, w: maxX - minX, h: maxY - minY,
                xPct: (minX / canvas.width * 100).toFixed(2),
                yPct: (minY / canvas.height * 100).toFixed(2),
                wPct: ((maxX - minX) / canvas.width * 100).toFixed(2),
                hPct: ((maxY - minY) / canvas.height * 100).toFixed(2)
            });
        }
    }
    
    document.body.innerHTML = "<pre id=\"out\">" + JSON.stringify(boxes, null, 2) + "</pre>";
};
</script>
</body>
</html>
