<!DOCTYPE html>
<html>
<head>
<style>
.player-setup {
    background: #ccc;
    padding: 20px;
    width: 400px;
    text-align: center;
}
.char-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    background: yellow;
}
.char-icon {
    width: 100%;
    aspect-ratio: 1/1;
    background: red;
}
</style>
</head>
<body>
    <div class="player-setup">
        <h3>Player 1</h3>
        <div class="char-grid">
            <div class="char-icon"></div>
            <div class="char-icon"></div>
            <div class="char-icon"></div>
            <div class="char-icon"></div>
        </div>
    </div>
</body>
</html>
